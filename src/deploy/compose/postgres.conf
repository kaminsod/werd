# PostgreSQL 17 tuning for Werd single-box deployment.
# Tuned for a host with 4-8 GB RAM running 6 databases.
# Mount this file in docker-compose.yml via the postgres command args.
#
# Adjust shared_buffers and effective_cache_size based on available RAM:
#   2 GB host  → shared_buffers = 256MB, effective_cache_size = 1GB
#   4 GB host  → shared_buffers = 512MB, effective_cache_size = 2GB (default below)
#   8 GB host  → shared_buffers = 1GB,   effective_cache_size = 4GB
#  16 GB host  → shared_buffers = 2GB,   effective_cache_size = 8GB

# ── Memory ──
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB

# ── Connections ──
# 6 services × ~20 connections each + headroom for admin/migrations
max_connections = 200

# ── WAL ──
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# ── Query Planner ──
random_page_cost = 1.1
effective_io_concurrency = 200

# ── Logging ──
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# ── Locale ──
timezone = 'UTC'
