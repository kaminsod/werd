openapi: 3.1.0
info:
  title: Werd API
  version: 0.0.1
  description: Werd platform API — multi-project social media automation and monitoring.
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:8090
    description: Local development

paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/login:
    post:
      summary: Authenticate user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /auth/me:
    get:
      summary: Get current user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /auth/me/password:
    put:
      summary: Change current user's password
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Current password incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects:
    get:
      summary: List projects for the authenticated user
      operationId: listProjects
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      summary: Create a new project
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                slug:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get project details
      operationId: getProject
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found or not a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
    put:
      summary: Update project (admin/owner)
      operationId: updateProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                slug:
                  type: string
                settings:
                  type: object
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
    delete:
      summary: Delete project (owner only)
      operationId: deleteProject
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Not the project owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List project members
      operationId: listProjectMembers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      summary: Add a member (admin/owner)
      operationId: addProjectMember
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, role]
              properties:
                user_id:
                  type: string
                  format: uuid
                role:
                  type: string
                  enum: [admin, member, viewer]
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"
        "409":
          description: User is already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/members/{userID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Change member role (admin/owner)
      operationId: updateProjectMemberRole
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [owner, admin, member, viewer]
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Insufficient role or cannot change owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
    delete:
      summary: Remove member or self-leave
      operationId: removeProjectMember
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Cannot remove owner or insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/alerts:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List alerts
      operationId: listAlerts
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, seen, triaged, dismissed, responded]
        - name: source_type
          in: query
          schema:
            $ref: "#/components/schemas/MonitorType"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertListResponse"

  /projects/{id}/alerts/{alertID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: alertID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get alert by ID
      operationId: getAlert
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Alert details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
    put:
      summary: Update alert status
      operationId: updateAlertStatus
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [new, seen, triaged, dismissed, responded]
      responses:
        "200":
          description: Alert updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /projects/{id}/keywords:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List keywords
      operationId: listKeywords
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of keywords
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Keyword"
    post:
      summary: Create keyword
      operationId: createKeyword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [keyword, match_type]
              properties:
                keyword:
                  type: string
                match_type:
                  type: string
                  enum: [exact, substring, regex]
      responses:
        "201":
          description: Keyword created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Keyword"

  /projects/{id}/keywords/{keywordID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: keywordID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: Delete keyword
      operationId: deleteKeyword
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Keyword deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/sources:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List monitor sources
      operationId: listSources
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of monitor sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
    post:
      summary: Create monitor source
      operationId: createSource
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, config]
              properties:
                type:
                  $ref: "#/components/schemas/MonitorType"
                config:
                  type: object
                enabled:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Source created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"

  /projects/{id}/sources/{sourceID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: sourceID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get source by ID
      operationId: getSource
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Source details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
    put:
      summary: Update source
      operationId: updateSource
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, config]
              properties:
                type:
                  $ref: "#/components/schemas/MonitorType"
                config:
                  type: object
                enabled:
                  type: boolean
      responses:
        "200":
          description: Source updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
    delete:
      summary: Delete source
      operationId: deleteSource
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Source deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/connections:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List platform connections
      operationId: listConnections
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connection"
    post:
      summary: Create platform connection
      operationId: createConnection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform]
              properties:
                platform:
                  type: string
                method:
                  type: string
                  enum: [api, browser]
                  default: api
                credentials:
                  type: object
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /projects/{id}/connections/{connID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: connID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get connection by ID
      operationId: getConnection
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
    put:
      summary: Update connection
      operationId: updateConnection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [api, browser]
                credentials:
                  type: object
                enabled:
                  type: boolean
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"
    delete:
      summary: Delete connection
      operationId: deleteConnection
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/posts:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List posts
      operationId: listPosts
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, scheduled, publishing, published, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated post list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"
    post:
      summary: Create post
      operationId: createPost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, platforms]
              properties:
                title:
                  type: string
                content:
                  type: string
                url:
                  type: string
                post_type:
                  type: string
                  enum: [text, link]
                platforms:
                  type: array
                  items:
                    type: string
                reply_to_url:
                  type: string
                  description: URL of existing post/thread to reply to (single platform only)
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /projects/{id}/posts/{postID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: postID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get post by ID
      operationId: getPost
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    put:
      summary: Update post
      operationId: updatePost
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, platforms]
              properties:
                title:
                  type: string
                content:
                  type: string
                url:
                  type: string
                post_type:
                  type: string
                  enum: [text, link]
                platforms:
                  type: array
                  items:
                    type: string
                reply_to_url:
                  type: string
                  description: URL of existing post/thread to reply to (single platform only)
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      summary: Delete post
      operationId: deletePost
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/posts/{postID}/publish:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: postID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Publish or schedule a post
      description: |
        Publishes a post immediately, or schedules it for future publishing.
        If `scheduled_at` is provided and in the future, the post status changes to "scheduled"
        and a background job will publish it at the specified time.
        If `scheduled_at` is omitted or in the past, the post is published immediately.
      operationId: publishPost
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scheduled_at:
                  type: string
                  format: date-time
                  description: Schedule publish for this time (must be in the future)
      responses:
        "200":
          description: Publish or schedule results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"

  /projects/{id}/posts/{postID}/unschedule:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: postID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Cancel a scheduled post
      description: Reverts a scheduled post back to draft status. The background job will detect the status change and skip publishing.
      operationId: unschedulePost
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Post reverted to draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "409":
          description: Post is not in scheduled status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/posts/{postID}/monitor:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: postID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Enable/disable reply monitoring for a post
      operationId: setPostMonitor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enable]
              properties:
                enable:
                  type: boolean
      responses:
        "200":
          description: Monitor setting updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/rules:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List notification rules
      operationId: listNotificationRules
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notification rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationRule"
    post:
      summary: Create notification rule
      operationId: createNotificationRule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [destination]
              properties:
                source_type:
                  type: string
                  enum: [reddit, hn, web, rss, github, bluesky, all]
                  default: all
                min_severity:
                  type: string
                  enum: [low, medium, high, critical]
                  default: low
                destination:
                  type: string
                  enum: [ntfy, webhook, email]
                config:
                  type: object
                enabled:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"

  /projects/{id}/rules/{ruleID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ruleID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get notification rule by ID
      operationId: getNotificationRule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"
    put:
      summary: Update notification rule
      operationId: updateNotificationRule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_type, min_severity, destination]
              properties:
                source_type:
                  type: string
                  enum: [reddit, hn, web, rss, github, bluesky, all]
                min_severity:
                  type: string
                  enum: [low, medium, high, critical]
                destination:
                  type: string
                  enum: [ntfy, webhook, email]
                config:
                  type: object
                enabled:
                  type: boolean
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationRule"
    delete:
      summary: Delete notification rule
      operationId: deleteNotificationRule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /projects/{id}/processing-rules:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List processing rules
      operationId: listProcessingRules
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of processing rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessingRule"
    post:
      summary: Create processing rule
      operationId: createProcessingRule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phase, rule_type, config]
              properties:
                name:
                  type: string
                source_id:
                  type: string
                  format: uuid
                phase:
                  type: string
                  enum: [filter, classify]
                rule_type:
                  type: string
                  enum: [keyword, regex, llm]
                config:
                  type: object
                priority:
                  type: integer
                  default: 0
                enabled:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Processing rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingRule"

  /projects/{id}/processing-rules/{ruleID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: ruleID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get processing rule by ID
      operationId: getProcessingRule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Processing rule details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingRule"
    put:
      summary: Update processing rule
      operationId: updateProcessingRule
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phase, rule_type, config]
              properties:
                name:
                  type: string
                source_id:
                  type: string
                  format: uuid
                phase:
                  type: string
                  enum: [filter, classify]
                rule_type:
                  type: string
                  enum: [keyword, regex, llm]
                config:
                  type: object
                priority:
                  type: integer
                enabled:
                  type: boolean
      responses:
        "200":
          description: Processing rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessingRule"
    delete:
      summary: Delete processing rule
      operationId: deleteProcessingRule
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Processing rule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /webhooks/ingest:
    post:
      summary: Ingest an alert via webhook
      operationId: webhookIngest
      security:
        - internalApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, source_type, title]
              properties:
                project_id:
                  type: string
                  format: uuid
                source_type:
                  $ref: "#/components/schemas/MonitorType"
                source_id:
                  type: string
                title:
                  type: string
                content:
                  type: string
                url:
                  type: string
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                  default: low
                tags:
                  type: array
                  items:
                    type: string
                monitor_source_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Alert ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "401":
          description: Missing or invalid API key

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Key

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        settings:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        message:
          type: string

    MonitorType:
      type: string
      enum: [reddit, hn, web, rss, github, bluesky]

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_type:
          $ref: "#/components/schemas/MonitorType"
        source_id:
          type: string
        title:
          type: string
        content:
          type: string
        url:
          type: string
        matched_keywords:
          type: array
          items:
            type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [new, seen, triaged, dismissed, responded]
        tags:
          type: array
          items:
            type: string
        classification_reason:
          type: string
        monitor_source_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AlertListResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        total:
          type: integer

    Keyword:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        keyword:
          type: string
        match_type:
          type: string
          enum: [exact, substring, regex]
        created_at:
          type: string
          format: date-time

    Source:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/MonitorType"
        config:
          type: object
          description: |
            Config varies by source type:
            - **reddit**: `{ mode, subreddit?, thread_id?, check_inbox?, check_mentions?, poll_interval_secs }`
            - **hn**: `{ mode, item_id?, username?, poll_interval_secs }`
            - **bluesky**: `{ mode, handle?, poll_interval_secs }`
            - **web**: `{ urls: string[], watch_ids?: string[], poll_interval_secs }` — URLs to monitor via changedetection.io. `watch_ids` are auto-provisioned.
            - **rss**: `{ feeds: string[], poll_interval_secs }` — RSS/Atom feed URLs. Paths starting with `/` are expanded as RSSHub routes.
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebSourceConfig:
      type: object
      description: Config for web (changedetection.io) monitor sources
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: string
          description: URLs to monitor for changes
        watch_ids:
          type: array
          items:
            type: string
          description: Auto-provisioned changedetection.io watch UUIDs (read-only)
        poll_interval_secs:
          type: integer
          default: 900
          description: How often to poll changedetection.io for new changes

    RSSSourceConfig:
      type: object
      description: Config for RSS/Atom monitor sources
      required: [feeds]
      properties:
        feeds:
          type: array
          items:
            type: string
          description: Feed URLs. Paths starting with "/" are expanded as RSSHub routes (e.g. /github/repos/torvalds)
        poll_interval_secs:
          type: integer
          default: 600
          description: How often to fetch feeds for new items

    Connection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        platform:
          type: string
          enum: [bluesky, reddit, hn, gmail, google_groups]
        method:
          type: string
          enum: [api, browser]
        target:
          type: string
          description: Non-secret display target (e.g. r/golang, @user.bsky.social, user@gmail.com, group@googlegroups.com)
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        url:
          type: string
        post_type:
          type: string
          enum: [text, link]
        platforms:
          type: array
          items:
            type: string
        reply_to_url:
          type: string
          description: URL of existing post/thread this is a reply to
        scheduled_at:
          type: string
          format: date-time
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [draft, scheduled, publishing, published, failed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PostListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer

    PlatformPublishResult:
      type: object
      properties:
        platform:
          type: string
        success:
          type: boolean
        post_id:
          type: string
        url:
          type: string
        error:
          type: string

    PublishResponse:
      type: object
      properties:
        post:
          $ref: "#/components/schemas/Post"
        results:
          type: array
          items:
            $ref: "#/components/schemas/PlatformPublishResult"

    NotificationRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_type:
          type: string
          enum: [reddit, hn, web, rss, github, bluesky, all]
        min_severity:
          type: string
          enum: [low, medium, high, critical]
        destination:
          type: string
          enum: [ntfy, webhook, email]
        config:
          type: object
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProcessingRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        name:
          type: string
        phase:
          type: string
          enum: [filter, classify]
        rule_type:
          type: string
          enum: [keyword, regex, llm]
        config:
          type: object
        priority:
          type: integer
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
