services:
  # ── Core (Werd) ──

  werd-api:
    build:
      context: ../../go/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgres://werd:${POSTGRES_PASSWORD}@postgres:5432/werd?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - BROWSER_SERVICE_URL=${BROWSER_SERVICE_URL:-}
    # ports:
    #   - "8090:8090"  # Uncomment for direct access bypassing Caddy (debugging)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - werd-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  werd-dashboard:
    build:
      context: ../../web
      dockerfile: Dockerfile
    restart: unless-stopped
    # ports:
    #   - "3000:3000"  # Uncomment for direct access bypassing Caddy (debugging)
    networks:
      - werd-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Infrastructure ──

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    command: >
      postgres
        -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: werd
      POSTGRES_DB: werd
      # Passed to init-db.sh for per-service user creation:
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Uncomment for host access (dev tools, psql)
    networks:
      - werd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werd"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"  # Uncomment for host access (RedisInsight, redis-cli)
    networks:
      - werd-net
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WERD_DOMAIN: ${WERD_DOMAIN}
    volumes:
      # Production (subdomain routing + auto-TLS):
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # Local-only (port-based, no TLS) — swap the line above with:
      # - ../caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - werd-net
    depends_on:
      werd-api:
        condition: service_healthy
      werd-dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Lightweight Services ──

  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy-data:/var/lib/ntfy
    networks:
      - werd-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/v1/health | grep -q healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  changedetect:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    restart: unless-stopped
    volumes:
      - changedetect-data:/datastore
    networks:
      - werd-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  rsshub:
    image: diygod/rsshub:latest
    restart: unless-stopped
    environment:
      CACHE_TYPE: redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
    networks:
      - werd-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:1200/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://umami:${UMAMI_DB_PASSWORD}@postgres:5432/umami?sslmode=disable
    networks:
      - werd-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

