# Redis 7 configuration for Werd single-box deployment.
# Tuned for a host with 4-8 GB RAM running multiple services on a shared instance.
#
# Adjust maxmemory based on available RAM:
#   2 GB host  → maxmemory 128mb
#   4 GB host  → maxmemory 256mb (default below)
#   8 GB host  → maxmemory 512mb
#  16 GB host  → maxmemory 1gb
#
# Database numbering convention (each service uses a separate DB to avoid key collisions):
#   0 = Werd API (sessions, cache)
#   2 = RSSHub (route cache)

# ── Memory ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence (AOF) ──
appendonly yes
appendfsync everysec

# ── Connections ──
# 2 services × ~20 connections each + headroom
maxclients 100

# ── Security ──
# Password is injected via --requirepass on the command line (from REDIS_PASSWORD env var)
# to support container-level secret injection without baking secrets into config files.

# ── Performance ──
tcp-keepalive 300
hz 10
