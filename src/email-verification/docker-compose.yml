services:
  mailpit:
    image: docker.io/axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${API_PORT:-8025}:8025"
    environment:
      MP_SMTP_BIND_ADDR: 0.0.0.0:25
      MP_UI_BIND_ADDR: 0.0.0.0:8025
      MP_MAX_MESSAGES: ${MP_MAX_MESSAGES:-5000}
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      MP_DATABASE: /data/mailpit.db
      MP_UI_AUTH: ${MP_UI_AUTH:-}
    volumes:
      - mailpit-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8025/api/v1/info"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mailpit-data:
