openapi: 3.1.0
info:
  title: Werd API
  version: 0.0.1
  description: Werd platform API — multi-project social media automation and monitoring.
  license:
    name: Apache-2.0

servers:
  - url: http://localhost:8090
    description: Local development

paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
